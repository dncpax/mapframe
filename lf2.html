<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa Leaflet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css"/>

  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
    #map {
      height: 100%;
		width: 100%;
		max-width: 100%;
		max-height: 100%;
    }
    #mode-banner {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: #3338; color: white; padding: 6px 14px;
      border-radius: 4px; font-family: sans-serif; z-index: 1000;
      display: none; pointer-events: none;
    }

    /*mapa*/
    .feature-locked {
      opacity: 0.35 !important;
      pointer-events: none;       /* prevents click / hover effects */
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="mode-banner"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<script>
// ────────────────────────────────────────────────
// Globals & layers
let map;
let currentEditedGeometry = null; // always holds the latest staged geometry (edit or create)
let editableGroup     = L.featureGroup();
let polygonLayer     = L.geoJSON(null, { style: polyStyle, onEachFeature: onEachFeature }).addTo(editableGroup);
let pointLayer       = L.geoJSON(null, {
  pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, fillColor: "#ff7800", color: "#000", weight: 1, opacity: 1, fillOpacity: 0.8 }),
  onEachFeature: onEachFeature
}).addTo(editableGroup);

let editLayer = L.geoJSON(null, {
  // Distinct style for the feature being edited
  style: { color: '#00ffff', weight: 4, opacity: 1, dashArray: '8, 8' },
  pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 10, fillColor: "#00ffff", color: "#fff", weight: 3, opacity: 1, fillOpacity: 0.9 })
});

let originalLayerBeingEdited = null; // a reference to the original layer that is hidden during edit
let pendingCreatedLayer = null;      // a newly drawn, not-yet-saved layer (null once saved or cancelled)

let highlightTimeout = null;   // for temporary glow on simple zoom
let highlightedLayer = null;   // Reference to the currently highlighted layer

const HIGHLIGHT_STYLE = {
  color: '#ffff00',
  weight: 4,
  opacity: 1
};

const DEBOUNCE_MS = 900;

// ────────────────────────────────────────────────
function polyStyle(feature) {
  return {
    color: "#3388ff",
    weight: 3,
    opacity: 0.85,
    fillOpacity: 0.15
  };
}

// ────────────────────────────────────────────────
// Popup logic
function onEachFeature(feature, layer) {
  if (feature.properties) {
    let content = '<div style="font-size:13px; line-height:1.4;">';
    for (const [key, value] of Object.entries(feature.properties)) {
      // Skip internal IDs or complex objects if needed
      content += `<strong>${key}:</strong> ${value}<br>`;
    }
    content += '</div>';
    layer.bindPopup(content);
  }
}

// Helper to find layer by feature id (used multiple times)
function findLayerById(id) {
  let found = null;
  editableGroup.eachLayer(geoJsonLayer => {
    geoJsonLayer.eachLayer(layer => {
      const fid = layer.feature?.mmv_id || layer.feature?.properties?.mmv_id;
      if (fid === id) found = layer;
    });
  });
  return found;
}

// ── Optional: small helper to flash highlight (better UX for zoom only) ──
function temporaryHighlight(layer, durationMs = 2400) {
  if (!layer) return;

  // Reset previous highlight if active
  if (highlightedLayer) {
    if (highlightedLayer._origStyle) {
      highlightedLayer.setStyle(highlightedLayer._origStyle);
      delete highlightedLayer._origStyle;
    }
    highlightedLayer = null;
  }
  if (highlightTimeout) clearTimeout(highlightTimeout);

  // Save current style
  layer._origStyle = {
    color: layer.options.color,
    weight: layer.options.weight,
    opacity: layer.options.opacity
  };

  highlightedLayer = layer;
  layer.setStyle(HIGHLIGHT_STYLE);
  if (layer.bringToFront) layer.bringToFront();

  highlightTimeout = setTimeout(() => {
    if (highlightedLayer && highlightedLayer._origStyle) {
      highlightedLayer.setStyle(highlightedLayer._origStyle);
      delete highlightedLayer._origStyle;
    }
    highlightedLayer = null;
  }, durationMs);
}

// Helper — disable/enable Geoman on ALL layers except optionally one
function setAllLayersEditable(editable = true, exceptLayer = null) {
  editableGroup.eachLayer(layer => {
    if (layer === exceptLayer) return;

    if (editable) {
      // Re-enable Geoman (if it was removed)
      if (!layer.pm) {
        layer.pm = new L.PM.Edit(layer); // or just rely on global enable later
      }
      layer.pm?.enable?.();
      layer.setStyle({ className: '' }); // remove locked style
    } else {
      // Most reliable way to **prevent** editing & handles
      if (layer.pm) {
        layer.pm.disable();
        delete layer.pm;           // ← important — Geoman respects missing .pm
      }
      layer.setStyle({ className: 'feature-locked' });
    }
  });
}


// ────────────────────────────────────────────────
function initMap() {
  debugger;

  // 1. Define the basemaps
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  });

  const aerial = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
  });

  map = L.map('map', {
    center: [39,-7.8],
    zoom: 8,
    pmIgnore: false,   // important for Geoman
    layers: [osm]      // Set the default basemap
  });

  editableGroup.addTo(map);
  editLayer.addTo(map);

  // Geoman controls (we'll enable/disable tools dynamically)
  map.pm.addControls({
    position: 'topleft',
    drawMarker:      false,   // controlled manually
    drawPolygon:     false,
    drawCircle:      false,
    drawRectangle:   false,
    drawPolyline:    false,
    editMode:        false,
    dragMode:        false,
    removalMode:     false,
    cutPolygon:      false
  });

  // 2. Add the layers control
  const baseMaps = {
    "Street Map": osm,
    "Aerial": aerial
  };
  L.control.layers(baseMaps).addTo(map);

  // ── Listen for geometry changes ──────────────────────────────
  editLayer.on('pm:dragend pm:markerdragend pm:vertex:changed', debounceSendGeometry);
  map.on('pm:globaleditmodetoggled', e => {
    if (!e.enabled) {
      send({ action: 'edit:stopped' });
    }
  });
  map.on('pm:globaldrawmodetoggled', e => {
    if (!e.enabled) {
      send({ action: 'draw:stopped' });
    }
  });

  // ── Forward feature clicks to parent ─────────────────────────
  editableGroup.on('click', e => {
    const fid = e.layer?.feature?.mmv_id || e.layer?.feature?.properties?.mmv_id;
    if (fid) {
      send({ action: 'feature:click', id: fid });
    }
  });

  // ────────────────────────────────────────────────
  // When the map has finished its initial load → notify parent
  // ────────────────────────────────────────────────
  map.whenReady(() => {
    // You can also use map.on('load', ...) — whenReady() is usually cleaner
    const readyMessage = {
      type: 'leaflet-ready',
      // optional useful info
      center: map.getCenter(),
      zoom: map.getZoom(),
      timestamp: Date.now()
    };

    // Send to parent
    // Use specific targetOrigin instead of '*' in production!
    send(readyMessage, '*');
    // Better (safer): window.parent.postMessage(readyMessage, 'https://your-parent-domain.com');

    console.log('Map is ready — sent notification to parent');
  });

  // ── New feature created ───────────────────────────────────────
  map.on('pm:create', e => {
    const layer = e.layer;
    const type  = e.shape;

    // Stop drawing immediately
    map.pm.disableDraw();

    // Give it an id if parent needs one (temporary)
    if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
    const tempId = 'temp-' + Date.now();
    layer.feature.mmv_id = tempId;
    layer.feature.properties.mmv_id = tempId;

    // Bind popup to new feature immediately
    onEachFeature(layer.feature, layer);

    // Add to correct collection
    if (type === 'Marker' || type === 'CircleMarker') {
      pointLayer.addLayer(layer);
    } else {
      polygonLayer.addLayer(layer);
      layer.setStyle(polyStyle(layer.feature)); // addLayer() skips the style fn — apply manually
    }
    pendingCreatedLayer = layer; // track so cancel can remove it

    currentEditedGeometry = layer.toGeoJSON(); // seed local var immediately
    send({
      action: 'feature:created',
      id: tempId,
      geojson: currentEditedGeometry,
      geometryType: type
    });

    // Auto-enter edit mode for new feature
    layer.pm.enable();

    // Listen for drags on this new layer to send updates
    layer.on('pm:markerdragend pm:dragend pm:edit', () => {
      currentEditedGeometry = layer.toGeoJSON(); // keep local var current
      send({
        action: 'feature:created',
        id: tempId,
        geojson: currentEditedGeometry,
        geometryType: type
      });
    });
  });
}

// ────────────────────────────────────────────────
function debounceSendGeometry() {
  clearTimeout(window.geoDebounce);
  window.geoDebounce = setTimeout(() => {
    if (editLayer.getLayers().length > 0) {
      // There is only ever one feature in the edit layer
      const editedFeature = editLayer.getLayers()[0].toGeoJSON();
      currentEditedGeometry = editedFeature;  // keep local copy current
      send({ action: 'geometry:changed', geojson: editedFeature });
    }
  }, DEBOUNCE_MS);
}

// ────────────────────────────────────────────────
function send(msg) {
  // Very important: target real parent origin in production!
  window.parent.postMessage(msg, '*');   // ← change to exact origin later
}

// ────────────────────────────────────────────────
// Message handler from parent
window.addEventListener('message', function(e) {
  // In production → if (e.origin !== 'https://your-app.com') return;

  const data = e.data;
  if (!data || !data.action) return;

  switch (data.action) {

    case 'load:geojson':
      // Expect { points?: GeoJSON, polygons?: GeoJSON }
      if (data.points) {
        pointLayer.clearLayers().addData(data.points);
      }
      if (data.polygons) {
        polygonLayer.clearLayers().addData(data.polygons);
      }
      editLayer.clearLayers(); // Ensure edit layer is cleared on full refresh
      pendingCreatedLayer = null; // layer was either saved (now reloaded) or irrelevant
      if (data.fit) {
        editableGroup.getBounds().isValid() && map.fitBounds(editableGroup.getBounds(), { padding: [40,40] });
      }
      break;


    case 'zoomTo:feature': {
      const id = data.id;
      if (!id) return;

      const targetLayer = findLayerById(id);
      if (!targetLayer) {
        console.warn(`Cannot zoom — feature ${id} not found`);
        send({ action: 'error', msg: `Erro no zoom - registo ${id} não encontrado no mapa.` });
        return;
      }

      // Optional: brief visual feedback (glow fades after ~2.5s)
      temporaryHighlight(targetLayer);

      // Zoom / center
      if (targetLayer.getBounds) {
        // Polygon / polyline / rectangle etc.
        map.fitBounds(targetLayer.getBounds(), {
          padding: [60, 60],     // some breathing room
          maxZoom: 17,           // avoid going too close if feature is huge
          animate: true
        });
      } else if (targetLayer.getLatLng) {
        // Point / marker / circle
        map.setView(targetLayer.getLatLng(), 16, { animate: true });
      } else {
        console.warn('Layer has no bounds or latlng');
      }

      // Optional feedback to Appsmith
      send({ action: 'zoomedTo', id });

      break;
    }


    case 'edit:start': {
      const id = data.id;
      if (!id) return;
      currentEditedGeometry = null; // reset before new edit session
      // If an edit is already in progress, cancel it first
      if (originalLayerBeingEdited) {
        // Restore the old one before starting a new edit
        const sourceLayer = (originalLayerBeingEdited.feature.geometry.type.includes('Point')) ? pointLayer : polygonLayer;
        sourceLayer.addLayer(originalLayerBeingEdited);
      }
      editLayer.clearLayers();

      const layerToEdit = findLayerById(id);
      if (!layerToEdit) {
        console.warn(`Cannot edit - feature ${id} not found`);
        send({ action: 'error', msg: `Erro ao editar - registo ${id} não encontrado no mapa.` });
        return;
      }

      // 1. Store and remove the original layer from its source
      originalLayerBeingEdited = layerToEdit;
      const sourceLayer = (layerToEdit.feature.geometry.type.includes('Point')) ? pointLayer : polygonLayer;
      sourceLayer.removeLayer(layerToEdit);

      // 2. Add a copy of the feature to the dedicated edit layer
      const featureCopy = layerToEdit.toGeoJSON();
      editLayer.addData(featureCopy);

      // 3. Enable editing on the new layer in editLayer and zoom
      editLayer.eachLayer(newEditLayer => {
        newEditLayer.pm.enable({ allowSelfIntersection: false });
        if (newEditLayer.getBounds) {
          map.fitBounds(newEditLayer.getBounds(), { padding: [80, 80], maxZoom: 18 });
        } else if (newEditLayer.getLatLng) {
          map.setView(newEditLayer.getLatLng(), 17);
        }
      });

      // 4. Show banner and notify parent
      const banner = document.getElementById('mode-banner');
      banner.textContent = "Modo de Edição";
      banner.style.display = 'block';

      send({ action: 'edit:started', id: id });
      break;
    }

    case 'edit:stop': // This now means "finish and save"
      if (editLayer.getLayers().length > 0) {
        const editedFeature = editLayer.getLayers()[0].toGeoJSON();
        send({ action: 'edit:finished', geojson: editedFeature });
      }
      // Clean up the edit state
      editLayer.clearLayers();
      originalLayerBeingEdited = null; // The original is gone, waiting for an update
      document.getElementById('mode-banner').style.display = 'none';

      break;

    case 'edit:cancel':
      currentEditedGeometry = null;
      // Remove a newly drawn layer that was never saved
      if (pendingCreatedLayer) {
        pointLayer.removeLayer(pendingCreatedLayer);
        polygonLayer.removeLayer(pendingCreatedLayer);
        pendingCreatedLayer = null;
      }
      if (originalLayerBeingEdited) {
        // Restore the original layer to its source
        const sourceLayer = (originalLayerBeingEdited.feature.geometry.type.includes('Point')) ? pointLayer : polygonLayer;
        sourceLayer.addLayer(originalLayerBeingEdited);
        originalLayerBeingEdited = null;
      }
      editLayer.clearLayers();
      document.getElementById('mode-banner').style.display = 'none';
      send({ action: 'edit:cancelled' });
      break;

    case 'update:feature': {
      const featureData = data.feature;
      if (!featureData || !featureData.properties || !featureData.properties.mmv_id) return;

      const featureId = featureData.properties.mmv_id;

      // Find and remove the old version of the layer, if it exists
      const oldLayer = findLayerById(featureId);
      if (oldLayer) oldLayer.remove();

      // Add the updated feature to the correct layer
      const targetLayer = (featureData.geometry.type.includes('Point')) ? pointLayer : polygonLayer;
      targetLayer.addData(featureData);
      break;
    }

    case 'enable:draw:marker':
      // disableDraw() + enable() must happen in the same tick so no
      // deferred Geoman event from the disable can fire in between.
      setTimeout(() => {
        map.pm.disableDraw();
        map.pm.Draw.Marker.enable();
      }, 100);
      break;

    case 'enable:draw:polygon':
      setTimeout(() => {
        map.pm.disableDraw();
        map.pm.Draw.Polygon.enable();
      }, 100);
      break;

    // ... you can add more draw types

    case 'disable:draw':
      map.pm.disableDraw();
      break;
  }
});


// Start
initMap();
</script>
</body>
</html>
