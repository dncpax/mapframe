<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const canvas = new OffscreenCanvas(1, 1);
const ctx    = canvas.getContext('2d');

window.addEventListener('message', async (event) => {
  const msg = event.data;
  if (!msg || msg.type !== 'resample') return;

  const { image, scale = 0.5, quality = 0.92, format, id } = msg;

  if (!image || typeof image !== 'string') {
    return reply({ type: 'resample-error', id, error: 'Missing or invalid image field' });
  }
  if (typeof scale !== 'number' || scale <= 0 || scale > 1) {
    return reply({ type: 'resample-error', id, error: 'scale must be a number between 0 (exclusive) and 1 (inclusive)' });
  }

  try {
    const blob   = await fetch(image).then(r => r.blob());
    const bitmap = await createImageBitmap(blob);

    const newW = Math.max(1, Math.round(bitmap.width  * scale));
    const newH = Math.max(1, Math.round(bitmap.height * scale));

    canvas.width  = newW;
    canvas.height = newH;
    ctx.clearRect(0, 0, newW, newH);
    ctx.drawImage(bitmap, 0, 0, newW, newH);
    bitmap.close();

    const srcMime   = image.match(/^data:([^;]+);/)?.[1] ?? 'image/png';
    const outFormat = format ?? srcMime;
    const outBlob   = await canvas.convertToBlob({ type: outFormat, quality });
    const outImage  = await blobToDataURL(outBlob);

    reply({
      type:           'resample-result',
      id,
      image:          outImage,
      originalWidth:  bitmap.width,
      originalHeight: bitmap.height,
      newWidth:       newW,
      newHeight:      newH,
      originalSize:   image.length,
      newSize:        outImage.length
    });
  } catch (e) {
    reply({ type: 'resample-error', id, error: e.message });
  }
});

function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Failed to convert blob to data URL'));
    reader.readAsDataURL(blob);
  });
}

function reply(data) {
  window.parent.postMessage(data, '*');
}
</script>
</body>
</html>
